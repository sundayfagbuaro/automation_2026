image:
  repository: mysql
  tag: 8.0
  
replicas: 1

fullnameOverride: flask-db

persistence:
  enabled: true
  storageClassName: nfs-csi-flaskdb
  accessModes:
    - ReadWriteOnce
  size: 5Gi

service:
  name: flask-db
  port: 3306

secrets:
  existingSecret: mysql-secret

initdbScripts:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS users_db;

    CREATE USER IF NOT EXISTS 'flaskuser'@'%' IDENTIFIED BY 'password';

    GRANT ALL PRIVILEGES ON users_db.* TO 'flaskuser'@'%';

    FLUSH PRIVILEGES;

    USE users_db;

    CREATE TABLE IF NOT EXISTS new_users (
      id INT AUTO_INCREMENT,
      f_name VARCHAR(30),
      l_name VARCHAR(30),
      address VARCHAR(30),
      phone VARCHAR(11),
      username VARCHAR(30),
      password VARCHAR(20),
      email VARCHAR(30),
      PRIMARY KEY(id)
    );

