image:
  registry: docker.io
  repository: mysql
  tag: 8.0.37

imagePullSecrets:
  - name: dockerhub-secret

fullnameOverride: flask-db

primary:
  podLabels:
    app: flask-db
  # Disable the preserve-logs-symlinks init container
  preserveLogsSymlinks:
    enabled: false

volumePermissions:
  enabled: true
  securityContext:
    runAsUser: 0

#persistence:
#  enabled: true
#  storageClass: nfs-csi-databases
#  accessModes:
#    - ReadWriteMany
#  size: 8Gi
#  persistentVolumeReclaimPolicy: Delete

persistence:
  enabled: true
  storageClass: ""        # leave empty for hostPath
  accessModes:
    - ReadWriteOnce
  size: 8Gi
  hostPath:
    path: /mysql_data  # path on the node
    type: DirectoryOrCreate

auth:
  existingSecret: mysql-secret
  username: flaskuser
  database: users_db

initdbScripts:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS users_db;


    use users_db

    CREATE TABLE new_users (
        id INT AUTO_INCREMENT,
        f_name VARCHAR(30),
        l_name VARCHAR(30),
        address VARCHAR(30),
        phone VARCHAR(11),
        username VARCHAR(30),
        password VARCHAR(20),
        email VARCHAR(30),
        PRIMARY KEY(id)
    );
