apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.service.name }}
spec:
  serviceName: {{ .Values.service.name }}
  replicas: {{ .Values.replicas }}

  selector:
    matchLabels:
      app: {{ .Values.service.name }}

  updateStrategy:
    type: RollingUpdate
  securityContext:
    fsGroup: 1001       # gives permission to write inside PV
    runAsUser: 1001  
  template:
    metadata:
      labels:
        app: {{ .Values.service.name }}
    spec:
      containers:
        - name: {{ .Values.service.name }}
          securityContext:
            runAsUser: 1001
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.existingSecret }}

          ports:
            - containerPort: {{ .Values.service.port }}
              name: mysql

          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql

            - name: initdb
              mountPath: /docker-entrypoint-initdb.d

      volumes:
        - name: initdb
          configMap:
            name: {{ include "mysql_deploy.fullname" . }}-initdb

  volumeClaimTemplates:
    - metadata:
        name: mysql-data
      spec:
        accessModes:
          - {{ .Values.persistence.accessModes | first }}
        storageClassName: {{ .Values.persistence.storageClassName }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}