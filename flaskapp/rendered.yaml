apiVersion: v1
kind: ConfigMap
metadata:
  name: myapp-mysql
  namespace: "default"
  labels:
    app.kubernetes.io/name: mysql
    helm.sh/chart: mysql-9.4.0
    app.kubernetes.io/instance: myapp
