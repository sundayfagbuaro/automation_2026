# Source: flaskapp/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-flaskapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flaskapp
  template:
    metadata:
      labels:
        app: flaskapp
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: flaskapp
              topologyKey: "kubernetes.io/hostname"
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              until nc -z -v -w30 myapp-mysql 3306; do
                echo "Waiting for MySQL..."
                sleep 5
              done
      containers:
        - name: flaskapp
          image: "sundayfagbuaro/flask-helm-deploy-img:1"
          ports:
            - containerPort: 5000
          env:
            - name: DB_HOST
              value: myapp-mysql

            - name: DB_NAME
              value: users_db

            - name: DB_PORT
              value: "3306"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: myapp-db-secret
                  key: DB_USER
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: myapp-db-secret
                  key: DB_PASS
        

#          env:
#            - name: DB_USER
#              valueFrom:
#                secretKeyRef:
#                  name: myapp-db-secret
#                  key: DB_USER
#            - name: DB_PASS
#                secretKeyRef:
##              valueFrom:
#                  name: myapp-db-secret
#                  key: DB_PASS

          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 200m
              memory: 256Mi

          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
