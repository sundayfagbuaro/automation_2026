database:
  auth:
    host: myapp-flaskapp-mysql   # MUST match your MySQL Service name
    name: users_db
    port: 3306

    secretName: myapp-db-secret
    secretUserKey: DB_USER
    secretPasswordKey: DB_PASS
  primary:
    persistence:
      enabled: true
      size: 5Gi


