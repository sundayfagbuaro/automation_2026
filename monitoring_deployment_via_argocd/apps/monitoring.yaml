apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-via-argocd
  namespace: argocd-monitoring
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack-argocd
    targetRevision: 55.5.0
    helm:
      valueFiles:
        - $values/values/monitoring-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring-argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
