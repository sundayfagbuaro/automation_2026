apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-stack
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/sundayfagbiaro/automation_2026.git  # <-- Git repo
    targetRevision: monitoring_via_argocd                     # <-- branch or tag
    path: monitoring_deployment_via_argocd/apps
    helm:
      chart: kube-prometheus-stack
      repoURL: https://prometheus-community.github.io/helm-charts
      targetRevision: 58.0.0
      valueFiles:
        - values-monitoring.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true