apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-stack
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 58.0.0
    helm:
      valueFiles: []  # no external values file needed
      values: |
        rbac:
          create: true

        defaultRules:
          create: true

        ingress:
          enabled: true
          ingressClassName: nginx
          hosts:
            - containers.sunny.lab
          path: /
          pathType: Prefix
          tls: []

        prometheus:
          prometheusSpec:
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: nfs-csi-prometheus
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 6Gi

        grafana:
          persistence:
            enabled: true
            storageClassName: nfs-csi-grafana
            accessModes: ["ReadWriteOnce"]
            size: 6Gi
          adminPassword: P@ssWord1
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true