apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-root
  namespace: argocd-monitoring
spec:
  project: default
  source:
    repoURL: git@github.com:sundayfagbuaro/automation_2026.git
    targetRevision: monitoring_via_argocd
    path: apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd-monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
