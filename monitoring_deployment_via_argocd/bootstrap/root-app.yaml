apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-root
  namespace: argocd
spec:
  project: default
  source:
#    repoURL: git@github.com:sundayfagbuaro/automation_2026.git
    repoURL: https://github.com/sundayfagbuaro/automation_2026.git
    targetRevision: monitoring_via_argocd
    path: monitoring_deployment_via_argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring-argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
