apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-root
  namespace: argocd-monitoring
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_USERNAME/gitops-lab
    targetRevision: main
    path: apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd-monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
