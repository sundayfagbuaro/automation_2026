# Naming conventions
naming:
  svm_prefix: "svm_"
  vol_prefix: "vol_"
  lun_prefix: "lun_"
  cifs_prefix: "share_"

# Aggregates configuration
aggregates:
  - name: aggr1
    size: 1TB
    disk_type: ssd
  - name: aggr2
    size: 2TB
    disk_type: ssd

# SVMs and Volumes
svms:
  - name: "{{ naming.svm_prefix }}prod1"
    root_volume: root_vol_prod1
    aggregate: aggr1
    volumes:
      - name: "{{ naming.vol_prefix }}data1"
        size: 100GB
        lun:
          name: "{{ naming.lun_prefix }}data1"
          size: 10GB
        nfs_export: /vol_data1
        cifs_share:
          name: "{{ naming.cifs_prefix }}data1"
          comment: "Automation CIFS Share 1"
  - name: "{{ naming.svm_prefix }}prod2"
    root_volume: root_vol_prod2
    aggregate: aggr2
    volumes:
      - name: "{{ naming.vol_prefix }}data2"
        size: 200GB
        lun:
          name: "{{ naming.lun_prefix }}data2"
          size: 20GB
        nfs_export: /vol_data2
        cifs_share:
          name: "{{ naming.cifs_prefix }}data2"
          comment: "Automation CIFS Share 2"

# SnapMirror relationships
snapmirrors:
  - source_svm: "{{ naming.svm_prefix }}prod1"
    source_volume: "{{ naming.vol_prefix }}data1"
    destination_svm: "{{ naming.svm_prefix }}prod2"
    destination_volume: "{{ naming.vol_prefix }}data2"
    schedule: daily
