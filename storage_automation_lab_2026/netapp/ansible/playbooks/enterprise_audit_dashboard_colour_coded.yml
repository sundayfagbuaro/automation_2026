---
- name: Enterprise ONTAP Audit & HTML Dashboard
  hosts: ontap_clusters
  gather_facts: no
  collections:
    - netapp.ontap
    - community.general

  vars:
    svm_csv: "ontap_audit_config.csv"
    snapmirror_csv: "ontap_snapmirror_config.csv"
    html_report_file: "ontap_audit_dashboard.html"
    naming_prefixes:
      svm: "svm_"
      volume: "vol_"
      lun: "lun_"
      cifs: "share_"

  tasks:

    # Step 1: Read CSV configuration
    - name: Read SVM/Volume CSV
      community.general.read_csv:
        path: "{{ svm_csv }}"
      register: csv_data

    - name: Read SnapMirror CSV
      community.general.read_csv:
        path: "{{ snapmirror_csv }}"
      register: snapmirror_data
      ignore_errors: yes

    # Step 2: Gather existing resources
    - name: Get existing SVMs
      na_ontap_svm_info:
        name: "*"
      register: existing_svms

    - name: Get existing Volumes
      na_ontap_volume_info:
        svm_name: "*"
      register: existing_volumes

    - name: Get existing LUNs
      na_ontap_lun_info:
        svm_name: "*"
      register: existing_luns

    - name: Get existing CIFS Shares
      na_ontap_cifs_share_info:
        svm_name: "*"
      register: existing_cifs

    - name: Get existing SnapMirrors
      na_ontap_snapmirror_info:
        source_svm: "*"
      register: existing_snapmirrors
      ignore_errors: yes

    # Step 3: Build audit report data
    - name: Initialize audit report
      set_fact:
        audit_report: []

    - name: Check SVMs
      set_fact:
        audit_report: "{{ audit_report + [ {'resource_type':'SVM','name':item.svm_name,'status': 'OK' if item.svm_name in existing_svms.records | map(attribute='name') | list else 'MISSING'} ] }}"
      loop: "{{ csv_data.list }}"

    - name: Check Volumes
      set_fact:
        audit_report: "{{ audit_report + [ {'resource_type':'Volume','name':item.volume_name,'svm':item.svm_name,'status': 'OK' if item.volume_name in existing_volumes.records | map(attribute='name') | list else 'MISSING'} ] }}"
      loop: "{{ csv_data.list }}"

    - name: Check LUNs
      set_fact:
        audit_report: "{{ audit_report + [ {'resource_type':'LUN','name':item.lun_name,'svm':item.svm_name,'volume':item.volume_name,'status': 'OK' if item.lun_name in existing_luns.records | map(attribute='name') | list else 'MISSING'} ] }}"
      loop: "{{ csv_data.list }}"
      when: item.lun_name != ""

    - name: Check CIFS Shares
      set_fact:
        audit_report: "{{ audit_report + [ {'resource_type':'CIFS Share','name':item.cifs_share_name,'svm':item.svm_name,'volume':item.volume_name,'status': 'OK' if item.cifs_share_name in existing_cifs.records | map(attribute='name') | list else 'MISSING'} ] }}"
      loop: "{{ csv_data.list }}"
      when: item.cifs_share_name != ""

    - name: Check SnapMirror Relationships
      set_fact:
        audit_report: "{{ audit_report + [ {'resource_type':'SnapMirror','source_svm':item.source_svm,'source_volume':item.source_volume,'destination_svm':item.destination_svm,'destination_volume':item.destination_volume,'status': 'OK' if (item.source_svm ~ '/' ~ item.source_volume ~ '->' ~ item.destination_svm ~ '/' ~ item.destination_volume) in existing_snapmirrors.records | map(attribute='name') | list else 'MISSING'} ] }}"
      loop: "{{ snapmirror_data.list }}"
      when: snapmirror_data.list is defined

    # Step 4: Generate HTML Dashboard
    - name: Generate HTML Dashboard
      copy:
        dest: "{{ html_report_file }}"
        content: |
          <!DOCTYPE html>
          <html>
          <head>
            <title>ONTAP Audit Dashboard</title>
            <style>
              body { font-family: Arial, sans-serif; }
              table { border-collapse: collapse; width: 100%; }
              th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
              th { background-color: #f2f2f2; }
              .OK { background-color: #c6efce; color: #006100; }
              .MISSING { background-color: #ffc7ce; color: #9c0006; }
              .MISCONFIG { background-color: #ffeb9c; color: #9c6500; }
            </style>
          </head>
          <body>
            <h2>ONTAP Audit Dashboard</h2>
            <table>
              <tr>
                <th>Resource Type</th>
                <th>Name</th>
                <th>SVM</th>
                <th>Volume</th>
                <th>Source SVM</th>
                <th>Source Volume</th>
                <th>Destination SVM</th>
                <th>Destination Volume</th>
                <th>Status</th>
              </tr>
              {% for item in audit_report %}
              <tr class="{{ item.status }}">
                <td>{{ item.resource_type | default('') }}</td>
                <td>{{ item.name | default('') }}</td>
                <td>{{ item.svm | default('') }}</td>
                <td>{{ item.volume | default('') }}</td>
                <td>{{ item.source_svm | default('') }}</td>
                <td>{{ item.source_volume | default('') }}</td>
                <td>{{ item.destination_svm | default('') }}</td>
                <td>{{ item.destination_volume | default('') }}</td>
                <td>{{ item.status }}</td>
              </tr>
              {% endfor %}
            </table>
          </body>
          </html>
