---
- name: Self-Healing ONTAP Automation Framework
  hosts: ontap_clusters
  gather_facts: no
  collections:
    - netapp.ontap

  vars_files:
    - ontap_prod_vars.yml

  tasks:

    # Step 1: Ensure Aggregates Exist
    - name: Create aggregates if missing
      na_ontap_aggregate:
        state: present
        name: "{{ item.name }}"
        disks: "{{ item.size }}"
        disk_type: "{{ item.disk_type }}"
      loop: "{{ aggregates }}"
      loop_control:
        label: "{{ item.name }}"

    # Step 2: Ensure SVMs Exist
    - name: Create SVMs
      na_ontap_svm:
        state: present
        name: "{{ item.name }}"
        root_volume: "{{ item.root_volume }}"
        root_volume_aggregate: "{{ item.aggregate }}"
        language_code: "en"
      loop: "{{ svms }}"
      loop_control:
        label: "{{ item.name }}"

    # Step 3: Ensure Volumes, LUNs, NFS, and CIFS
    - name: Configure Volumes, LUNs, NFS, and CIFS
      block:

        - name: Create Volume if missing
          na_ontap_volume:
            state: present
            name: "{{ volume.name }}"
            aggregate_name: "{{ svm.aggregate }}"
            size: "{{ volume.size }}"
            svm_name: "{{ svm.name }}"

        - name: Create LUN if defined
          when: volume.lun is defined
          na_ontap_lun:
            state: present
            name: "{{ volume.lun.name }}"
            size: "{{ volume.lun.size }}"
            svm_name: "{{ svm.name }}"
            volume: "{{ volume.name }}"
            space_reservation: enabled

        - name: Configure NFS export if defined
          when: volume.nfs_export is defined
          na_ontap_nfs_export:
            state: present
            svm_name: "{{ svm.name }}"
            path: "{{ volume.nfs_export }}"
            read_only: no
            read_write_clients: ["*"]

        - name: Configure CIFS Share if defined
          when: volume.cifs_share is defined
          na_ontap_cifs_share:
            state: present
            svm_name: "{{ svm.name }}"
            share_name: "{{ volume.cifs_share.name }}"
            path: "/{{ volume.name }}"
            comment: "{{ volume.cifs_share.comment }}"
            access_rights:
              - name: "Everyone"
                permission: full_control

      loop: "{{ svms }}"
      loop_control:
        loop_var: svm
      vars:
        volumes: "{{ svm.volumes }}"
      with_nested:
        - "{{ svms }}"
        - "{{ svm.volumes }}"
      loop_control:
        label: "{{ svm.name }} - {{ volume.name }}"

    # Step 4: Configure SnapMirror Relationships
    - name: Configure SnapMirror Relationships
      when: snapmirrors is defined
      na_ontap_snapmirror:
        state: present
        source_svm: "{{ item.source_svm }}"
        source_volume: "{{ item.source_volume }}"
        destination_svm: "{{ item.destination_svm }}"
        destination_volume: "{{ item.destination_volume }}"
        schedule: "{{ item.schedule }}"
      loop: "{{ snapmirrors }}"
      loop_control:
        label: "{{ item.source_svm }}/{{ item.source_volume }} -> {{ item.destination_svm }}/{{ item.destination_volume }}"

    # Step 5: Optional: Enforce Naming Conventions (Check Only)
    - name: Validate naming conventions
      debug:
        msg: "Validating SVM {{ item.name }} follows prefix {{ naming.svm_prefix }}"
      loop: "{{ svms }}"
