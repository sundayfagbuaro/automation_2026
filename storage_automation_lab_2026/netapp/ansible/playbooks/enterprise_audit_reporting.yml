---
- name: Enterprise ONTAP Audit & Report
  hosts: ontap
  gather_facts: no
  collections:
    - netapp.ontap
    - community.general

  vars:
    svm_csv: "dynamic_config_CSV.csv"
  #  snapmirror_csv: "ontap_snapmirror_config.csv"
    report_file: "ontap_audit_report.csv"
  #  naming_prefixes:
  #    svm: "svm_"
  #    volume: "vol_"
  #    lun: "lun_"
  #    cifs: "share_"


  tasks:
    # Step 1: Read CSV configuration
    - name: Read SVM/Volume CSV
      community.general.read_csv:
        path: "{{ svm_csv }}"
      register: csv_data
      delegate_to: localhost
      run_once: true

    #- name: Read SnapMirror CSV
    #  community.general.read_csv:
    #    path: "{{ snapmirror_csv }}"
    #  register: snapmirror_data
    #  ignore_errors: yes

    # Step 2: Get existing resources
    #- name: Get existing SVMs
      #na_ontap_svm_info:
      #netapp.ontap.na_ontap_rest_info:
      #  name: "*"
      #register: existing_svms
    

    - name: Get existing SVMs
      netapp.ontap.na_ontap_rest_info:
        hostname: "{{ ansible_host }}"
        username: "{{ ontap_username }}"
        password: "{{ ontap_password }}"
        gather_subset:
          - svm/svms
        validate_certs: false
      register: svm_info

    #- name: Get existing Volumes
      #na_ontap_volume_info:
    #  netapp.ontap.na_ontap_rest_info:
    #    svm_name: "*"
    #  register: existing_volumes
    

    - name: Get existing volumes
      netapp.ontap.na_ontap_rest_info:
        hostname: "{{ ansible_host }}"
        username: "{{ ontap_username }}"
        password: "{{ ontap_password }}"
        gather_subset:
          - storage/volumes
        validate_certs: false
      register: volume_info


    #- name: Get existing LUNs
    #  #na_ontap_lun_info:
    #  netapp.ontap.na_ontap_rest_info:
    #    svm_name: "*"
    #  register: existing_luns
    

   # - name: Get existing LUNs
   #   netapp.ontap.na_ontap_rest_info:
   #     hostname: "{{ ansible_host }}"
   #     username: "{{ ontap_username }}"
    #    password: "{{ ontap_password }}"
    #    gather_subset:
    #     - storage/luns
     #   validate_certs: false
     # register: lun_info


    #- name: Get existing CIFS Shares
    #  netapp.ontap.na_ontap_rest_info:
    #    hostname: "{{ ansible_host }}"
    #    username: "{{ ontap_username }}"
    #    password: "{{ ontap_password }}"
    #    gather_subset:
    #     - storage/cifs
    #    validate_certs: false
    #  register: cifs_info

    #- name: Get existing SnapMirrors
