    #    source_svm: "*"
    #  register: existing_snapmirrors
    #  ignore_errors: yes


    # Step 3: Audit resources and create report
    - name: Initialize audit report
      set_fact:
        audit_report: []
    
    
    - name: Check SVMs
      set_fact:
        audit_report: >-
          {{ audit_report + [
              {'resource_type': 'SVM',
              'name': item.svm_name,
              'status': 'OK' if item.svm_name in svm_info else 'MISSING'}
            ] }}
      loop: "{{ csv_data.list }}"

   # - name: Check Volumes
    #    audit_report: "{{ audit_report + [ {'resource_type':'Volume','name':item.volume_name,'svm':item.svm_name,'status': 'OK' if item.volume_name in volume_info | map(attribute='name') | list else 'MISSING'} ] }}"
   ##   set_fact:
    #  loop: "{{ csv_data.list }}"
    
    - name: Check Volumes
      set_fact:
        audit_report: >- 
          {{ audit_report + [ 
              {'resource_type':'Volume',
              'name':item.volume_name,'svm':item.svm_name,
              'status': 'OK' if item.volume_name in volume_info else 'MISSING'}
            ] }}  
      loop: "{{ csv_data.list }}"

   # - name: Check LUNs
   #   set_fact:
   #     audit_report: >-
   #       {{ (audit_report if audit_report is iterable else []) + [
   #           {
