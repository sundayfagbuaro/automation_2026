---
- name: Dynamic ONTAP Automation from CSV
  hosts: ontap_clusters
  gather_facts: no
  collections:
    - netapp.ontap

  vars:
    data_config_file: "prod_dynamic_config_CSV.csv"
    snapmirror_config_file: "snapmirror_config_CSV.csv"

  tasks:

    - name: Read CSV configuration
      community.general.read_csv:
        path: "{{ data_config_file }}"
        path: "{{ snapmirror_config_file }}"
      register: csv_data

    - name: Ensure aggregates exist
      na_ontap_aggregate:
        state: present
        name: "{{ item.aggregate }}"
      loop: "{{ csv_data.list | unique(attribute='aggregate') }}"
      loop_control:
        label: "{{ item.aggregate }}"

    - name: Ensure SVM exists
      na_ontap_svm:
        state: present
        name: "{{ item.svm_name }}"
        root_volume: "{{ item.root_volume }}"
        root_volume_aggregate: "{{ item.aggregate }}"
        language_code: "en"
      loop: "{{ csv_data.list }}"
      loop_control:
        label: "{{ item.svm_name }}"

    - name: Ensure Volume exists
      na_ontap_volume:
        state: present
        name: "{{ item.volume_name }}"
        aggregate_name: "{{ item.aggregate }}"
        size: "{{ item.volume_size }}"
        svm_name: "{{ item.svm_name }}"
      loop: "{{ csv_data.list }}"
      loop_control:
        label: "{{ item.svm_name }}/{{ item.volume_name }}"

    - name: Ensure LUN exists if defined
      na_ontap_lun:
        state: present
        name: "{{ item.lun_name }}"
        size: "{{ item.lun_size }}"
        svm_name: "{{ item.svm_name }}"
        volume: "{{ item.volume_name }}"
        space_reservation: enabled
      loop: "{{ csv_data.list }}"
      loop_control:
        label: "{{ item.svm_name }}/{{ item.lun_name }}"
      when: item.lun_name != ""

    - name: Configure NFS export if defined
      na_ontap_nfs_export:
        state: present
        svm_name: "{{ item.svm_name }}"
        path: "{{ item.nfs_export }}"
        read_only: no
        read_write_clients: ["*"]
      loop: "{{ csv_data.list }}"
      loop_control:
        label: "{{ item.svm_name }}/{{ item.nfs_export }}"
      when: item.nfs_export != ""

    - name: Configure CIFS share if defined
      na_ontap_cifs_share:
        state: present
        svm_name: "{{ item.svm_name }}"
        share_name: "{{ item.cifs_share_name }}"
        path: "/{{ item.volume_name }}"
        comment: "{{ item.cifs_share_comment }}"
        access_rights:
          - name: "Everyone"
            permission: full_control
      loop: "{{ csv_data.list }}"
      loop_control:
        label: "{{ item.svm_name }}/{{ item.cifs_share_name }}"
      when: item.cifs_share_name != ""
    
    - name: Configure SnapMirror from CSV
      na_ontap_snapmirror:
        state: present
        source_svm: "{{ item.source_svm }}"
        source_volume: "{{ item.source_volume }}"
        destination_svm: "{{ item.destination_svm }}"
        destination_volume: "{{ item.destination_volume }}"
        schedule: "{{ item.schedule }}"
      loop: "{{ snapmirror_data.list }}"

