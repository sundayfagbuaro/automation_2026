---
- name: Enterprise ONTAP Provisioning and Audit
  hosts: ontap_clusters
  gather_facts: no
  collections:
    - netapp.ontap
    - community.general  # For CSV reading

  vars:
    svm_csv: "prod_dynamic_config_CSV.csv"
    snapmirror_csv: "snapmirror_config_CSV.csv"
    naming_prefixes:
      svm: "svm_"
      volume: "vol_"
      lun: "lun_"
      cifs: "share_"

  tasks:

    # Step 1: Read CSV configuration
    - name: Read SVM and volume CSV
      community.general.read_csv:
        path: "{{ svm_csv }}"
      register: csv_data

    - name: Read SnapMirror CSV
      community.general.read_csv:
        path: "{{ snapmirror_csv }}"
      register: snapmirror_data
      ignore_errors: yes

    # Step 2: Validate naming conventions
    - name: Validate naming conventions
      assert:
        that:
          - item.svm_name.startswith(naming_prefixes.svm)
          - item.volume_name.startswith(naming_prefixes.volume)
          - (item.lun_name == "" or item.lun_name.startswith(naming_prefixes.lun))
          - (item.cifs_share_name == "" or item.cifs_share_name.startswith(naming_prefixes.cifs))
        fail_msg: "Naming convention violation: {{ item }}"
      loop: "{{ csv_data.list }}"

    # Step 3: Check existing SVMs
    - name: Get existing SVMs
      na_ontap_svm_info:
        name: "*"
      register: existing_svms

    - name: Report missing SVMs
      debug:
        msg: "SVM {{ item.svm_name }} is missing!"
      loop: "{{ csv_data.list }}"
      when: item.svm_name not in existing_svms.records | map(attribute='name') | list

    # Step 4: Check existing volumes
    - name: Get existing volumes
      na_ontap_volume_info:
        svm_name: "*"
      register: existing_volumes

    - name: Report missing volumes
      debug:
        msg: "Volume {{ item.volume_name }} in SVM {{ item.svm_name }} is missing!"
      loop: "{{ csv_data.list }}"
      when: item.volume_name not in existing_volumes.records | map(attribute='name') | list

    # Step 5: Optional auto-provision missing resources
    - name: Auto-create missing SVMs
      na_ontap_svm:
        state: present
        name: "{{ item.svm_name }}"
        root_volume: "{{ item.root_volume }}"
        root_volume_aggregate: "{{ item.aggregate }}"
        language_code: "en"
      loop: "{{ csv_data.list }}"
      when: item.svm_name not in existing_svms.records | map(attribute='name') | list

    - name: Auto-create missing Volumes
      na_ontap_volume:
        state: present
        name: "{{ item.volume_name }}"
        aggregate_name: "{{ item.aggregate }}"
        size: "{{ item.volume_size }}"
        svm_name: "{{ item.svm_name }}"
      loop: "{{ csv_data.list }}"
      when: item.volume_name not in existing_volumes.records | map(attribute='name') | list

    # Step 6: Optional SnapMirror audit
    - name: Get existing SnapMirrors
      na_ontap_snapmirror_info:
        source_svm: "*"
      register: existing_snapmirrors
      ignore_errors: yes

    - name: Report missing SnapMirrors
      debug:
        msg: "SnapMirror {{ item.source_svm }}/{{ item.source_volume }} -> {{ item.destination_svm }}/{{ item.destination_volume }} missing!"
      loop: "{{ snapmirror_data.list }}"
      when: existing_snapmirrors is defined and
            not (item.source_svm ~ "/" ~ item.source_volume ~ "->" ~ item.destination_svm ~ "/" ~ item.destination_volume) in
                existing_snapmirrors.records | map(attribute='name') | list

    - name: Optional: Auto-create SnapMirror
      na_ontap_snapmirror:
        state: present
        source_svm: "{{ item.source_svm }}"
        source_volume: "{{ item.source_volume }}"
        destination_svm: "{{ item.destination_svm }}"
        destination_volume: "{{ item.destination_volume }}"
        schedule: "{{ item.schedule }}"
      loop: "{{ snapmirror_data.list }}"
      when: snapmirror_data.list is defined
