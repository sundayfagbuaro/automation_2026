---
- name: Full ONTAP Automation Playbook
  hosts: ontap_clusters
  gather_facts: no
  collections:
    - netapp.ontap

  vars:
    # Variables
    svm_name: svm1
    svm_root_vol: root_vol
    aggregate_name: aggr1
    volume_name: vol_test
    volume_size: 50MB
    lun_name: lun_test
    lun_size: 10GB
    nfs_export_path: /vol_test
    cifs_share_name: share_test
    cifs_comment: "CIFS Share for Automation"
    cifs_server_name: CIFS_SERVER

  tasks:

    - name: Create SVM (Storage Virtual Machine)
      na_ontap_svm:
        state: present
        name: "{{ svm_name }}"
        root_volume: "{{ svm_root_vol }}"
        root_volume_aggregate: "{{ aggregate_name }}"
        language_code: "en"

    - name: Create a Volume
      na_ontap_volume:
        state: present
        name: "{{ volume_name }}"
        aggregate_name: "{{ aggregate_name }}"
        size: "{{ volume_size }}"
        svm_name: "{{ svm_name }}"

    - name: Create a LUN
      na_ontap_lun:
        state: present
        name: "{{ lun_name }}"
        size: "{{ lun_size }}"
        svm_name: "{{ svm_name }}"
        volume: "{{ volume_name }}"
        space_reservation: enabled

    - name: Configure NFS Export
      na_ontap_nfs_export:
        state: present
        svm_name: "{{ svm_name }}"
        path: "{{ nfs_export_path }}"
        read_only: no
        readonly_clients: []
        read_write_clients: ["*"]

    - name: Configure CIFS Server
      na_ontap_cifs:
        state: present
        svm_name: "{{ svm_name }}"
        server_name: "{{ cifs_server_name }}"
        domain_name: "WORKGROUP"

    - name: Configure CIFS Share
      na_ontap_cifs_share:
        state: present
        svm_name: "{{ svm_name }}"
        share_name: "{{ cifs_share_name }}"
        path: "/{{ volume_name }}"
        comment: "{{ cifs_comment }}"
        access_rights:
          - name: "Everyone"
            permission: full_control
