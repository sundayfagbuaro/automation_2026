apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-flaskapp-db-init-{{ now | unixEpoch }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-secret
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for secret to appear..."
              while [ ! -f /etc/secrets/DB_USER ]; do
                sleep 2
              done
              echo "Secret found!"
          volumeMounts:
            - name: db-secret
              mountPath: /etc/secrets
              readOnly: true
      containers:
        - name: db-init
          image: mysql:8.0
          command:
            - sh
            - -c
            - |
              echo "Waiting for MySQL to be ready..."
              until mysqladmin ping \
                -h {{ .Release.Name  }}-mysql \
                -u"$DB_USER" \
                -p"$DB_PASS" \
                --silent; do
                echo "MySQL not ready, sleeping..."
                sleep 3
              done

              echo "Creating database and table if not exists"
              mysql -h {{ .Release.Name }}-mysql \
                    -u $DB_USER -p$DB_PASS \
                    -e "CREATE DATABASE IF NOT EXISTS {{ .Values.database.auth.name }}; USE {{ .Values.database.auth.name }}; 
                       CREATE TABLE IF NOT EXISTS new_users (
                         id INT PRIMARY KEY AUTO_INCREMENT,
                         f_name VARCHAR(50),
                         l_name VARCHAR(50),
                         address VARCHAR(50),
                         phone VARCHAR(50),
                         username VARCHAR(50),
                         password VARCHAR(50),
                         email VARCHAR(50)
                       );"

              echo "Database initialization complete."
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: myapp-db-secret
                  key: DB_USER
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: myapp-db-secret
                  key: DB_PASS
          volumeMounts:
            - name: db-secret
              mountPath: /etc/secrets
              readOnly: true
      volumes:
        - name: db-secret
          secret:
            secretName: myapp-db-secret
